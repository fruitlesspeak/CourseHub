services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: app-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fruitfulpeak/coursehub-backend:latest  # Pulls from Hub
    container_name: app-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"
    networks:
      - app-net

  # Vue.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: fruitfulpeak/coursehub-frontend:latest  # Pulls from Hub
    container_name: app-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app-net

  # Dedicated Test Runner
  test-runner:
    image: maven:3.9-eclipse-temurin-21
    container_name: app-test-runner
    depends_on:
      db:
        condition: service_healthy
    environment:
      #Connects the tests to the test database
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - ./backend:/app
      # Cache Maven dependencies
      - ~/.m2:/root/.m2
    working_dir: /app
    networks:
      - app-net
    command: mvn test

networks:
  app-net:
    driver: bridge

volumes:
  db_data:
